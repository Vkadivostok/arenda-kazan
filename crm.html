<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Аренда · CRM</title>
<style>
:root{
  --bg:#0f1115; --surface:#181b22; --surface2:#1f232c; --line:#2a2f3a;
  --txt:#eef1f6; --muted:#9aa3b2; --accent:#5b8cff; --accent2:#7c5bff;
  --green:#34d399; --red:#f87171; --amber:#fbbf24;
  --radius:18px; --shadow:0 8px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro","Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--txt);
  max-width:520px;margin:0 auto;min-height:100vh;
  padding-bottom:88px;position:relative;overflow-x:hidden;
}
.header{
  padding:22px 18px 14px;position:sticky;top:0;z-index:20;
  background:linear-gradient(180deg,var(--bg) 70%,transparent);
  display:flex;justify-content:space-between;align-items:flex-start;
}
.header h1{font-size:24px;margin:0;font-weight:700;letter-spacing:-.5px}
.header p{margin:4px 0 0;color:var(--muted);font-size:13px}
.hbtns{display:flex;gap:8px}
.hbtn{background:var(--surface);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:9px 11px;font-size:12px;font-weight:600;cursor:pointer}
.tabs{display:flex;gap:8px;padding:0 18px 14px}
.tab{
  flex:1;padding:11px;border-radius:14px;border:1px solid var(--line);
  background:var(--surface);color:var(--muted);font-size:13px;font-weight:600;
  text-align:center;cursor:pointer;transition:.2s;
}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;box-shadow:0 6px 18px rgba(91,140,255,.35)}
.summary{display:flex;gap:10px;padding:0 18px 16px}
.stat{
  flex:1; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
  animation: fadeIn 0.5s ease forwards;
}
.stat:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.3);
  border-color: rgba(91,140,255,0.4);
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
.stat .v{font-size:22px;font-weight:700;margin-bottom:2px}
.stat .l{font-size:12px;color:var(--muted);font-weight:500}
.stat .v.g{color:var(--green)} .stat .v.r{color:var(--red)}
.list{padding:0 18px}
.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;transition:.15s;
}
.card:active{transform:scale(.98)}
.card.alert{border-color:var(--red);background:linear-gradient(180deg,rgba(248,113,113,.10),var(--surface))}
.card.freec{border-color:var(--accent);background:linear-gradient(180deg,rgba(91,140,255,.12),var(--surface))}
.card .top{display:flex;justify-content:space-between;align-items:flex-start}
.card .name{font-size:16px;font-weight:700}
.card .sub{font-size:12px;color:var(--muted);margin-top:3px}
.badge{font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;white-space:nowrap}
.badge.free{background:rgba(248,113,113,.15);color:var(--red)}
.badge.rented{background:rgba(52,211,153,.15);color:var(--green)}
.badge.warn{background:rgba(251,191,36,.18);color:var(--amber)}
.badge.over{background:rgba(248,113,113,.2);color:var(--red)}
.card .meta{display:flex;gap:16px;margin-top:12px;font-size:13px}
.card .meta b{display:block;font-size:15px;font-weight:700}
.card .meta span{color:var(--muted);font-size:11px}
.payline{margin-top:11px;padding-top:11px;border-top:1px solid var(--line);font-size:12px;display:flex;justify-content:space-between;align-items:center}
.payline.over{color:var(--red);font-weight:600}
.payline.soon{color:var(--amber);font-weight:600}
.fab{position:fixed;left:50%;transform:translateX(-50%);bottom:24px;z-index:30;width:min(484px,calc(100% - 36px));}
.fab button{
  width:100%;padding:16px;border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 10px 30px rgba(124,91,255,.4);
}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40;display:none;backdrop-filter:blur(4px)}
.overlay.show{display:block}
.sheet{
  position:fixed; left:50%; right:auto; bottom:auto; top:50%;
  transform:translate(-50%, -46%) scale(0.95); opacity:0; pointer-events:none;
  width: calc(100% - 32px); max-width: 560px;
  max-height: 85vh; border-radius: 24px; padding: 24px 20px 28px;
  background: var(--surface2); z-index: 50; overflow-y: auto;
  box-shadow: 0 25px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05) inset;
  transition: .4s cubic-bezier(.175, .885, .32, 1.275);
}
.sheet.show{transform:translate(-50%, -50%) scale(1); opacity:1; pointer-events:auto;}
.grip{display:none;}
.sheet h2{margin:0 0 16px;font-size:22px;font-weight:700;letter-spacing:-0.5px}
label{display:block;font-size:12px;color:var(--muted);margin:12px 0 5px;font-weight:600}
input,select,textarea{
  width:100%;padding:13px;border-radius:12px;border:1px solid var(--line);
  background:var(--surface);color:var(--txt);font-size:15px;font-family:inherit;
}
textarea{resize:vertical;min-height:60px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
.row{display:flex;gap:10px}.row>div{flex:1}
.btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:18px}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn.green{background:rgba(52,211,153,.15);color:var(--green);margin-top:10px}
.btn.ghost{background:var(--surface);color:var(--txt);border:1px solid var(--line);margin-top:10px}
.btn.danger{background:rgba(248,113,113,.12);color:var(--red);margin-top:10px}
.dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.section-t{font-size:13px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:22px 0 10px}
.kv{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);font-size:14px;gap:10px}
.kv .k{color:var(--muted)} .kv .v{font-weight:600;text-align:right}
.exp{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
.exp .t{font-size:14px;font-weight:600}.exp .d{font-size:11px;color:var(--muted);margin-top:2px}
.exp .a{font-weight:700;color:var(--red)}
.exp .x{color:var(--muted);font-size:18px;padding:0 4px;cursor:pointer}
.add-exp{font-size:13px;color:var(--accent);font-weight:700;cursor:pointer;padding:6px 0}
.arc{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
.arc .n{font-weight:700;font-size:14px}.arc .t{font-size:13px;margin-top:3px}
.arc .d{font-size:12px;color:var(--muted);margin-top:3px}
.arc .lnk{color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;display:inline-block}
.rep{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
.rep .n{font-weight:700;margin-bottom:8px}
.rep .r{display:flex;justify-content:space-between;font-size:13px;padding:4px 0}
.rep .r .g{color:var(--green)}.rep .r .rd{color:var(--red)}
.note{color:var(--muted);font-size:12px;margin:6px 0 0}
.photogrid{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0}
.photogrid .ph{position:relative;width:72px;height:72px;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.photogrid .ph img{width:100%;height:100%;object-fit:cover;display:block}
.photogrid .ph .del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border-radius:50%;width:20px;height:20px;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.photobtn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:13px;border-radius:12px;border:1px solid var(--line);background:var(--surface);color:var(--txt);font-size:14px;font-weight:600;cursor:pointer;margin:0}
.gallery{display:flex;gap:8px;overflow-x:auto;padding:4px 0 2px}
.gallery img{height:96px;border-radius:12px;border:1px solid var(--line);cursor:pointer}
details.spoiler{margin:0}
details.spoiler>summary{list-style:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
details.spoiler>summary::-webkit-details-marker{display:none}
details.spoiler>summary .chev{transition:.2s}
details.spoiler[open]>summary .chev{transform:rotate(180deg)}

/* Модалка деталей */
.close-btn {
  width:32px; height:32px; border-radius:50%; background:var(--surface2); border:1px solid var(--line);
  color:var(--txt); display:flex; align-items:center; justify-content:center;
  font-size:16px; cursor:pointer; transition:.2s; padding:0; flex-shrink:0;
}
.close-btn:hover { background:var(--line); }

.detail-grid { display:grid; gap:24px; margin-top:20px; }
.detail-col { display:flex; flex-direction:column; gap:0; }
.mini-stat {
  background:var(--surface); border:1px solid var(--line); border-radius:14px;
  padding:14px; margin-top:10px;
}
.mini-stat.alert { border-color:var(--red); background:rgba(248,113,113,0.06); }
.mini-stat .l { font-size:12px; color:var(--muted); font-weight:600; }
.mini-stat .v { font-size:18px; font-weight:700; margin-top:4px; }
.actions-group { display:flex; flex-direction:column; gap:10px; margin-top:24px; background:var(--surface); border-radius:16px; padding:16px; border:1px solid var(--line); }
.actions-group .btn { margin-top:0; }

/* ---------- Большие экраны (планшет / десктоп) ---------- */
@media(min-width:760px){
  body{max-width:1200px;padding:0 28px 110px}
  .header{padding:30px 6px 18px}
  .header h1{font-size:32px}
  .tabs{padding:0 6px 18px;max-width:600px}
  .summary{padding:0 6px 22px;max-width:100%}
  .stat{padding:22px}
  .stat .v{font-size:28px}
  .stat .l{font-size:13px}
  .list{padding:0 6px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px;align-items:start}
  .list>.card{margin-bottom:0}
  .fullspan{grid-column:1/-1}
  .fab{left:auto;right:28px;transform:none;width:auto}
  .fab button{width:auto;padding:16px 30px;font-size:15px;border-radius:20px}
  .overlay{background:rgba(0,0,0,.6);backdrop-filter:blur(8px)}
  .sheet{
    width:640px;max-width:92vw;padding:30px;
    box-shadow:0 30px 80px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,0.08) inset;
  }
  #detailSheet { width: 920px; }
  .detail-grid { grid-template-columns: 1fr 1fr; gap: 40px; }
  .gallery img{height:140px}
  .photogrid .ph{width:100px;height:100px}
}
@media(min-width:1140px){
  body{max-width:1440px}
  .list{grid-template-columns:repeat(3,minmax(0,1fr))}
}
@media(min-width:1400px){
  body{max-width:1600px}
  .list{grid-template-columns:repeat(4,minmax(0,1fr))}
}
</style>
</head>
<body>
<div class="header">
  <div><h1>Аренда</h1><p>Управление недвижимостью</p></div>
  <div class="hbtns">
    <div class="hbtn" onclick="openReports()">📊 Отчёты</div>
    <div class="hbtn" onclick="openArchive()">🗂 Архив</div>
  </div>
</div>
<div class="tabs">
  <div class="tab active" data-type="parking" onclick="switchTab('parking')">🅿️ Машиноместа</div>
  <div class="tab" data-type="premise" onclick="switchTab('premise')">🏢 Нежилые помещения</div>
</div>
<div class="summary" id="summary"></div>
<div class="list" id="list"></div>

<div class="fab"><button onclick="openEdit(null)">＋ Добавить объект</button></div>

<div class="overlay" id="overlay" onclick="closeSheet(event)"></div>

<!-- Карточка объекта -->
<div class="sheet" id="editSheet">
  <div class="grip"></div>
  <h2 id="editTitle">Новый объект</h2>
  <input type="hidden" id="f_id">
  <label>Название / номер объекта</label>
  <input id="f_name" placeholder="напр. Машиноместо №14">
  <label>Адрес</label>
  <input id="f_address" placeholder="г. Казань, ул. ...">
  <div class="row">
    <div><label>Площадь, м²</label><input id="f_area" type="number" inputmode="decimal" placeholder="0"></div>
    <div><label>Статус</label>
      <select id="f_status"><option value="free">Свободно</option><option value="rented">В аренде</option></select>
    </div>
  </div>
  <div class="section-t" style="margin-top:18px">Арендатор</div>
  <label>ФИО / организация</label>
  <input id="f_tenant" placeholder="напр. ООО «Ромашка»">
  <label>Реквизиты / паспорт / ИНН</label>
  <input id="f_tenant_req" placeholder="ИНН 1650000000 / паспорт ...">
  <label>Телефон для связи</label>
  <input id="f_phone" type="tel" inputmode="tel" placeholder="+7 900 000-00-00">
  <div class="row">
    <div><label>Аренда в мес., ₽</label><input id="f_rent" type="number" inputmode="decimal" placeholder="0"></div>
    <div><label>Депозит, ₽</label><input id="f_deposit" type="number" inputmode="decimal" placeholder="0"></div>
  </div>
  <div class="row">
    <div><label>Начало аренды</label><input id="f_start" type="date"></div>
    <div><label>Окончание</label><input id="f_end" type="date"></div>
  </div>
  <div class="row">
    <div><label>Индексация в год, %</label><input id="f_index" type="number" inputmode="decimal" placeholder="напр. 7"></div>
    <div><label>Рег. в Росреестре</label>
      <select id="f_reg"><option value="no">Не зарегистрирован</option><option value="yes">Зарегистрирован</option></select>
    </div>
  </div>
  <div class="row">
    <div><label>Дата очередного платежа</label><input id="f_nextpay" type="date"></div>
    <div><label>День платежа</label><input id="f_payday" type="number" inputmode="numeric" placeholder="5"></div>
  </div>
  <label>Комментарий</label>
  <textarea id="f_comment" placeholder="любая дополнительная информация по объекту/арендатору"></textarea>
  <div class="section-t" style="margin-top:18px">Фотографии <span style="text-transform:none;font-weight:400;color:var(--muted)" id="photoCount"></span></div>
  <div id="photoPreview" class="photogrid"></div>
  <div class="row">
    <label class="photobtn">📷 Камера
      <input type="file" accept="image/*" capture="environment" multiple style="display:none" onchange="handlePhotos(this)">
    </label>
    <label class="photobtn">🖼 Галерея
      <input type="file" accept="image/*" multiple style="display:none" onchange="handlePhotos(this)">
    </label>
  </div>
  <p class="note">До 10 фото на карточку, автоматически сжимаются.</p>
  <button class="btn primary" onclick="saveObject()">Сохранить</button>
  <button class="btn ghost" onclick="hideSheet('editSheet')">Отмена</button>
</div>

<!-- Детали -->
<div class="sheet" id="detailSheet">
  <div class="grip"></div>
  <div id="detailBody"></div>
</div>

<!-- Расход -->
<div class="sheet" id="expSheet">
  <div class="grip"></div>
  <h2>Расход на содержание</h2>
  <label>Назначение</label>
  <select id="e_cat">
    <option>Коммунальные услуги</option><option>Электроэнергия</option>
    <option>Уборка / клининг</option><option>Ремонт</option>
    <option>Налог на имущество</option><option>Охрана</option>
    <option>Управляющая компания</option><option>Прочее</option>
  </select>
  <div class="row">
    <div><label>Сумма, ₽</label><input id="e_amount" type="number" inputmode="decimal" placeholder="0"></div>
    <div><label>Дата</label><input id="e_date" type="date"></div>
  </div>
  <label>Примечание</label>
  <textarea id="e_note" placeholder="дополнительная информация по расходу"></textarea>
  <button class="btn primary" onclick="saveExpense()">Добавить расход</button>
  <button class="btn ghost" onclick="hideSheet('expSheet')">Отмена</button>
</div>

<!-- Архив -->
<div class="sheet" id="archiveSheet">
  <div class="grip"></div>
  <h2>🗂 Архив арендаторов</h2>
  <div id="archiveBody"></div>
  <button class="btn ghost" onclick="hideSheet('archiveSheet')">Закрыть</button>
</div>

<!-- Отчёты -->
<div class="sheet" id="reportSheet">
  <div class="grip"></div>
  <h2>📊 Отчёт за период</h2>
  <div class="row">
    <div><label>С</label><input id="r_from" type="date"></div>
    <div><label>По</label><input id="r_to" type="date"></div>
  </div>
  <button class="btn primary" onclick="buildReport()">Сформировать</button>
  <div id="reportBody" style="margin-top:18px"></div>
  <button class="btn ghost" onclick="hideSheet('reportSheet')">Закрыть</button>
</div>

<!-- Архив расходов -->
<div class="sheet" id="expArchiveSheet">
  <div class="grip"></div>
  <h2>🗂 Архив расходов</h2>
  <div id="expArchiveBody"></div>
  <button class="btn ghost" onclick="hideSheet('expArchiveSheet')">Закрыть</button>
</div>

let nextId=200, curObjId=null;
const money=n=>(Number(n)||0).toLocaleString('ru-RU')+' ₽';
const fdate=d=>d?new Date(d).toLocaleDateString('ru-RU'):'—';
const sum=arr=>arr.reduce((a,e)=>a+(+e.amount||0),0);
const today=()=>{const t=new Date();t.setHours(0,0,0,0);return t;};
const daysTo=d=>d?Math.round((new Date(d)-today())/864e5):null;
function term(o){if(!o.start||!o.end)return'';let m=(new Date(o.end)-new Date(o.start))/2.63e9;if(m<=0)return'';let y=Math.floor(m/12),mo=Math.round(m%12);return '· '+((y?y+' г. ':'')+(mo?mo+' мес.':'')).trim();}
function addMonth(d){const x=new Date(d);x.setMonth(x.getMonth()+1);return x.toISOString().slice(0,10);}
const MONTHS=['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
function isCurMonth(e){if(!e||!e.date)return false;const d=new Date(e.date),n=new Date();return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}
function curMonthName(){const n=new Date();return MONTHS[n.getMonth()]+' '+n.getFullYear();}
function plural(n,one,few,many){const m=n%10,d=n%100;return n+' '+(m===1&&d!==11?one:m>=2&&m<=4&&(d<10||d>=20)?few:many);}
function tenancyDuration(start){
  if(!start)return '—';
  let s=new Date(start),e=today();if(e<s)return 'ещё не началась';
  let y=e.getFullYear()-s.getFullYear(),m=e.getMonth()-s.getMonth(),d=e.getDate()-s.getDate();
  if(d<0){m--;const pm=new Date(e.getFullYear(),e.getMonth(),0).getDate();d+=pm;}
  if(m<0){y--;m+=12;}
  const parts=[];if(y)parts.push(plural(y,'год','года','лет'));if(m)parts.push(plural(m,'месяц','месяца','месяцев'));parts.push(plural(d,'день','дня','дней'));
  return parts.join(' ');
}

/* статусы */
function payState(o){
  if(o.status!=='rented'||!o.nextpay)return{cls:'',score:0,label:''};
  const d=daysTo(o.nextpay);
  if(d<0)return{cls:'over',score:4,label:'просрочка '+(-d)+' дн.'};
  if(d<=7)return{cls:'soon',score:3,label:'платёж через '+d+' дн.'};
  return{cls:'',score:0,label:'платёж '+fdate(o.nextpay)};
}
function leaseState(o){
  if(o.status!=='rented'||!o.end)return{cls:'',score:0};
  const d=daysTo(o.end);
  if(d<0)return{cls:'over',score:3};
  if(d<=45)return{cls:'soon',score:2};
  return{cls:'',score:0};
}

function render(){

  let objs=state.objects.filter(o=>o.type===state.current);
  const rented=objs.filter(o=>o.status==='rented');
  const income=rented.reduce((s,o)=>s+(+o.rent||0),0);
  const exp=parking?sum(state.parkingExpenses.filter(isCurMonth)):objs.reduce((s,o)=>s+sum(o.expenses.filter(isCurMonth)),0);
  document.querySelector('.fab button').textContent=parking?'＋ Добавить машиноместо':'＋ Добавить помещение';
  document.getElementById('summary').innerHTML=`
    <div class="stat"><div class="v">${objs.length}</div><div class="l">Объектов · ${rented.length} в аренде</div></div>
    <div class="stat"><div class="v g">${money(income)}</div><div class="l">Доход / мес</div></div>
    <div class="stat"><div class="v r">${money(exp)}</div><div class="l">Расходы (${curMonthName()})</div></div>`;
  // сортировка: проблемные наверх
  objs=objs.map(o=>({o,p:payState(o),l:leaseState(o)}))
           .sort((a,b)=>(b.p.score+b.l.score)-(a.p.score+a.l.score));
  const list=document.getElementById('list');
  let html='';
  if(parking){
    const cur=state.parkingExpenses.filter(isCurMonth);
    const old=state.parkingExpenses.filter(e=>!isCurMonth(e));
    html+=`<div class="card fullspan" style="cursor:default">
      <details class="spoiler">
        <summary><span>Общие расходы · ${curMonthName()} · ${money(sum(cur))}</span><span class="chev">▾</span></summary>
        <div style="display:flex;justify-content:flex-end;margin-top:6px"><span class="add-exp" onclick="openExp('parking')">+ добавить расход</span></div>
        <div id="commonExpList">${renderExpItems(cur,'parking')}</div>
        ${old.length?`<div class="add-exp" style="border-top:1px solid var(--line);margin-top:6px;padding-top:10px" onclick="openExpArchive()">🗂 Архив расходов прошлых месяцев (${old.length})</div>`:''}
      </details>
    </div>`;
  }
  if(!objs.length){html+='<div class="empty fullspan">Нет объектов. Нажмите «Добавить».</div>';list.innerHTML=html;return;}
  html+=objs.map(({o,p,l})=>{
    const alert=p.score>=3||l.score>=2;
    const right=parking?`<span>Срок до</span><b style="font-size:13px">${fdate(o.end)}</b>`
                       :`<span>Расходы</span><b style="color:var(--red)">${money(sum(o.expenses))}</b>`;
    let pay='';
    if(o.status==='rented'){
      const pc=p.cls?('payline '+(p.cls==='over'?'over':'soon')):'payline';
      pay=`<div class="${pc}"><span>💳 ${o.nextpay?fdate(o.nextpay):'платёж не задан'}${p.label&&p.cls?' · '+p.label:''}</span><b>${money(o.rent)}</b></div>`;
    }
    const lb=l.cls==='over'?'<span class="badge over">аренда истекла</span>':l.cls==='soon'?'<span class="badge warn">срок заканчивается</span>':`<span class="badge ${o.status}">${o.status==='rented'?'В аренде':'Свободно'}</span>`;
    return `<div class="card ${alert?'alert':o.status==='free'?'freec':''}" onclick="openDetail(${o.id})">
      <div class="top"><div><div class="name">${o.name}</div><div class="sub">${o.address||'без адреса'} · ${o.area||0} м²</div></div>${lb}</div>
      <div class="meta">
        <div><span>Аренда/мес</span><b>${money(o.rent)}</b></div>
        <div><span>Арендатор</span><b style="font-size:13px">${o.tenant||'—'}</b></div>
        <div>${right}</div>
      </div>${pay}</div>`;
  }).join('');
  list.innerHTML=html;
}

let editPhotos=[];
function handlePhotos(input){
  const files=Array.from(input.files||[]);
  files.forEach(file=>{
    if(editPhotos.length>=10){alert('Не более 10 фото на карточку');return;}
    const r=new FileReader();
    r.onload=e=>{const img=new Image();img.onload=()=>{
      const max=1280;let w=img.width,h=img.height;
      if(w>max){h=Math.round(h*max/w);w=max;}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      if(editPhotos.length<10){editPhotos.push(c.toDataURL('image/jpeg',0.5));renderPhotoPreview();}
    };img.src=e.target.result;};
    r.readAsDataURL(file);
  });
  input.value='';
}

        <button class="btn green" onclick="markPaid(${o.id})">✓ Отметить платёж получен (+${money(o.rent)})</button>`:''}
        
        <button class="btn primary" style="margin-top:${o.status==='rented'?'10px':'20px'}" onclick="genContract(${o.id})">📄 Сформировать договор (.docx)</button>
        ${o.status==='rented'?`<button class="btn ghost" onclick="toArchive(${o.id})">🗂 Завершить аренду → в архив</button>`:''}
        
        ${o.type==='premise'?`
        <div class="section-t" style="display:flex;justify-content:space-between;align-items:center;margin-top:20px;">
          <span>Расходы · ${money(eSum)}</span>
          <span class="add-exp" onclick="openExp(${o.id})">+ добавить</span>
        </div>
        <div id="expList">${renderExp(o)}</div>`:`
        <div class="section-t" style="margin-top:20px;">Расходы на содержание</div>
        <p class="note">Расходы по машиноместам учитываются общим списком в разделе «Машиноместа».</p>`}
      </div>
    </div>`;
  showSheet('detailSheet');
}
function renderExp(o,target){
  const t=target!==undefined?target:o.id;
  return renderExpItems(o.expenses,t);
}
function renderExpItems(arr,t){
  if(!arr.length)return '<div class="empty" style="padding:16px">В этом месяце расходов нет</div>';
  return arr.map(e=>`<div class="exp"><div><div class="t">${e.cat}</div>
    <div class="d">${fdate(e.date)}${e.note?' · '+e.note:''}</div></div>
    <div style="display:flex;align-items:center;gap:6px"><span class="a">${money(e.amount)}</span>
    <span class="x" onclick="delExp('${t}',${e.id})">✕</span></div></div>`).join('');
}
function openExpArchive(){
  const items=[];
  state.parkingExpenses.filter(e=>!isCurMonth(e)).forEach(e=>items.push({e,src:'Машиноместа (общие)',t:'parking'}));
  state.objects.filter(o=>o.type==='premise').forEach(o=>o.expenses.filter(e=>!isCurMonth(e)).forEach(e=>items.push({e,src:o.name,t:o.id})));
  items.sort((a,b)=>new Date(b.e.date)-new Date(a.e.date));
  document.getElementById('expArchiveBody').innerHTML=items.length?items.map(({e,src,t})=>
    `<div class="exp"><div><div class="t">${e.cat} <span style="color:var(--muted);font-weight:400">· ${src}</span></div>
      <div class="d">${fdate(e.date)}${e.note?' · '+e.note:''}</div></div>
      <div style="display:flex;align-items:center;gap:6px"><span class="a">${money(e.amount)}</span>
      <span class="x" onclick="delExp('${t}',${e.id});openExpArchive()">✕</span></div></div>`).join('')
    :'<div class="empty">Архив расходов пуст.</div>';
  showSheet('expArchiveSheet');
}
function expStore(target){return target==='parking'?state.parkingExpenses:state.objects.find(x=>x.id===+target).expenses;}
function openExp(target){curObjId=target;e_cat.selectedIndex=0;e_note.value='';e_amount.value='';e_date.value=new Date().toISOString().slice(0,10);showSheet('expSheet');}
function saveExpense(){
  expStore(curObjId).push({id:++nextId,cat:e_cat.value,note:e_note.value,amount:+e_amount.value||0,date:e_date.value});
  hideSheet('expSheet');refreshExpList();render();
}
function delExp(target,eid){
  const store=expStore(target);const i=store.findIndex(e=>e.id===eid);if(i<0)return;
  if(!confirm('Удалить расход «'+store[i].cat+'» на '+money(store[i].amount)+'?'))return;
  store.splice(i,1);refreshExpList();render();
}
function refreshExpList(){
  const cl=document.getElementById('commonExpList');
  if(cl)cl.innerHTML=renderExpItems(state.parkingExpenses.filter(isCurMonth),'parking');
  const el=document.getElementById('expList');
  if(el&&curObjId!=='parking'){const o=state.objects.find(x=>x.id===+curObjId);if(o)el.innerHTML=renderExp(o);}
}

/* ---------- Архив ---------- */
function openArchive(){
  const a=state.archive;
  document.getElementById('archiveBody').innerHTML=a.length?a.map(r=>`
    <div class="arc">
      <div class="n">${r.name} <span style="color:var(--muted);font-weight:400">· ${r.type==='parking'?'машиноместо':'помещение'}</span></div>
      <div class="t">👤 ${r.tenant} <span style="color:var(--muted)">(${r.tenant_req||'—'})</span></div>
      <div class="d">📅 ${fdate(r.start)} — ${fdate(r.end)} · аренда ${money(r.rent)}/мес</div>
      ${r.comment?`<div class="d">💬 ${r.comment}</div>`:''}
      <span class="lnk" onclick="genContractRec(${r.id})">📄 Скачать договор (.docx)</span>
      <span class="lnk" style="color:var(--red);margin-left:14px" onclick="delArchive(${r.id})">🗑 Удалить</span>
    </div>`).join(''):'<div class="empty">Архив пуст. Завершите аренду в карточке объекта — запись попадёт сюда.</div>';
  showSheet('archiveSheet');
}
function delArchive(id){
  const r=state.archive.find(x=>x.id===id);if(!r)return;
  if(!confirm('Удалить запись архива по арендатору «'+r.tenant+'»?'))return;
  state.archive=state.archive.filter(x=>x.id!==id);openArchive();
}

/* ---------- Отчёты ---------- */
function openReports(){
  const now=new Date();
  r_from.value=new Date(now.getFullYear(),0,1).toISOString().slice(0,10);
  r_to.value=now.toISOString().slice(0,10);
  document.getElementById('reportBody').innerHTML='';
  showSheet('reportSheet');
}
function inRange(d,f,t){if(!d)return false;const x=new Date(d);return x>=new Date(f)&&x<=new Date(t);}
function buildReport(){
  const f=r_from.value,t=r_to.value;
  if(!f||!t){alert('Укажите период');return;}
  let html='',totIn=0,totEx=0;
  // помещения — по каждому
  const prem=state.objects.filter(o=>o.type==='premise');
  if(prem.length){
    html+='<div class="section-t">Нежилые помещения</div>';
    prem.forEach(o=>{
      const inc=sum((o.payments||[]).filter(p=>inRange(p.date,f,t)));
      const ex=sum(o.expenses.filter(e=>inRange(e.date,f,t)));
      totIn+=inc;totEx+=ex;
      html+=`<div class="rep"><div class="n">${o.name}</div>
        <div class="r"><span>Прибыль (поступления)</span><span class="g">${money(inc)}</span></div>
        <div class="r"><span>Расходы</span><span class="rd">${money(ex)}</span></div>
        <div class="r"><span>Итого</span><b>${money(inc-ex)}</b></div></div>`;
    });
  }
  // машиноместа — суммарно
  const park=state.objects.filter(o=>o.type==='parking');
  const pInc=park.reduce((s,o)=>s+sum((o.payments||[]).filter(p=>inRange(p.date,f,t))),0);
  const pEx=sum(state.parkingExpenses.filter(e=>inRange(e.date,f,t)));
  totIn+=pInc;totEx+=pEx;
  html+='<div class="section-t">Все машиноместа (суммарно)</div>';
  html+=`<div class="rep"><div class="n">${park.length} машиномест</div>
    <div class="r"><span>Прибыль (поступления)</span><span class="g">${money(pInc)}</span></div>
    <div class="r"><span>Общие расходы</span><span class="rd">${money(pEx)}</span></div>
    <div class="r"><span>Итого</span><b>${money(pInc-pEx)}</b></div></div>`;
  // итог
  html+=`<div class="rep" style="border-color:var(--accent)"><div class="n">ИТОГО за период</div>
    <div class="r"><span>Прибыль</span><span class="g">${money(totIn)}</span></div>
    <div class="r"><span>Расходы</span><span class="rd">${money(totEx)}</span></div>
    <div class="r"><span>Чистый результат</span><b style="color:${totIn-totEx>=0?'var(--green)':'var(--red)'}">${money(totIn-totEx)}</b></div></div>`;
  html+='<p class="note">Прибыль = фактически отмеченные платежи за период. Отмечайте платежи кнопкой «Платёж получен» в карточке.</p>';
  document.getElementById('reportBody').innerHTML=html;
}

/* ---------- Договор (.docx через Word-HTML) ---------- */
function genContract(id){const o=state.objects.find(x=>x.id===id);buildContract(o);}
function genContractRec(id){const r=state.archive.find(x=>x.id===id);buildContract(r);}
function buildContract(o){
  const obj=o.type==='parking'?'машино-место':'нежилое помещение';
  const months=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const now=new Date();
  const dur=term(o).replace('· ','');
  const body=
  '<h2 style="text-align:center">ДОГОВОР АРЕНДЫ '+(o.type==='parking'?'МАШИНО-МЕСТА':'НЕЖИЛОГО ПОМЕЩЕНИЯ')+'</h2>'+
  '<p style="text-align:center">г. Казань&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;«'+now.getDate()+'» '+months[now.getMonth()]+' '+now.getFullYear()+' г.</p>'+
  '<p>Арендодатель, именуемый в дальнейшем «Арендодатель», с одной стороны, и <b>'+(o.tenant||'_____________________')+'</b> ('+(o.tenant_req||'реквизиты не указаны')+'), именуемый в дальнейшем «Арендатор», с другой стороны, заключили настоящий договор о нижеследующем:</p>'+
  '<p><b>1. Предмет договора</b><br>1.1. Арендодатель передаёт, а Арендатор принимает во временное возмездное пользование '+obj+': <b>'+o.name+'</b>, расположенное по адресу: '+(o.address||'_____________')+', площадью '+(o.area||'___')+' м².</p>'+
  '<p><b>2. Срок аренды (долгосрочная аренда)</b><br>2.1. Настоящий договор является долгосрочным и заключается на срок с '+fdate(o.start)+' по '+fdate(o.end)+(dur?' ('+dur+')':'')+'.<br>2.2. Поскольку срок аренды составляет один год и более, договор подлежит обязательной государственной регистрации в Управлении Росреестра и считается заключённым с момента такой регистрации (ст. 651 ГК РФ).<br>2.3. По истечении срока Арендатор, надлежаще исполнявший обязанности, имеет преимущественное право на заключение договора на новый срок.</p>'+
  '<p><b>3. Арендная плата и расчёты</b><br>3.1. Арендная плата составляет <b>'+money(o.rent)+'</b> в месяц.<br>3.2. Обеспечительный платёж (депозит): '+money(o.deposit)+'.<br>3.3. Оплата производится не позднее 5 числа каждого месяца.<br>3.4. Арендная плата ежегодно индексируется на '+(o.index?o.index+'%':'____%')+'; изменение размера платы в пределах индексации не требует переоформления договора (ст. 614 ГК РФ).</p>'+
  '<p><b>4. Права и обязанности сторон</b><br>4.1. Арендатор обязуется использовать имущество по назначению, поддерживать его в исправном состоянии и своевременно вносить арендную плату.<br>4.2. Арендодатель обязуется передать имущество в состоянии, пригодном для использования, и не препятствовать его использованию в течение всего срока аренды.</p>'+
  '<p><b>5. Расторжение договора</b><br>5.1. Досрочное расторжение по инициативе любой из сторон допускается с письменным уведомлением другой стороны не менее чем за 3 (три) месяца.<br>5.2. Иные основания расторжения определяются ст. 619, 620 ГК РФ.</p>'+
  '<p><b>6. Прочие условия</b><br>6.1. Договор составлен в трёх экземплярах: по одному для каждой из сторон и один для органа регистрации.<br>6.2. Все изменения оформляются дополнительными соглашениями и подлежат государственной регистрации.<br>6.3. Во всём остальном стороны руководствуются действующим законодательством РФ.</p>'+
  '<br><table width="100%"><tr><td width="50%"><b>Арендодатель</b><br><br>_______________ / _________ /</td>'+
  '<td width="50%"><b>Арендатор</b><br><br>_______________ / '+(o.tenant||'_________')+' /</td></tr></table>';
  const html='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><style>body{font-family:\'Times New Roman\',serif;font-size:14px}h2{font-size:16px}p{text-align:justify}</style></head><body>'+body+'</body></html>';
  const blob=new Blob(['﻿'+html],{type:'application/msword'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='Договор_'+(o.name||'объект').replace(/[^а-яА-Яa-zA-Z0-9]+/g,'_')+'.doc';
  document.body.appendChild(a);a.click();a.remove();
}
render();
</script>
</body>
</html>
